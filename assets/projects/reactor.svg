<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Reactor micro-kernel: a central kernel with reactor and transport spokes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d0e"/>
      <stop offset="1" stop-color="#0c2a2d"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#14b8c4"/>
      <stop offset="1" stop-color="#0e9aa7"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="40" y="56" fill="#eaf6f6" font-size="26" font-weight="700">reactor</text>

    <g transform="translate(320 212)">
      <!-- spokes -->
      <g stroke="#14b8c4" stroke-opacity="0.5" stroke-width="2">
        <line x1="0" y1="0" x2="-170" y2="-70"/><line x1="0" y1="0" x2="170" y2="-70"/>
        <line x1="0" y1="0" x2="-185" y2="40"/><line x1="0" y1="0" x2="185" y2="40"/>
        <line x1="0" y1="0" x2="-95" y2="110"/><line x1="0" y1="0" x2="95" y2="110"/>
      </g>
      <!-- peripheral nodes (reactors / transports) -->
      <g fill="#0b0d0e" stroke="#0e9aa7" stroke-width="2.5">
        <rect x="-202" y="-86" width="64" height="34" rx="8"/><rect x="138" y="-86" width="64" height="34" rx="8"/>
        <rect x="-217" y="24" width="64" height="34" rx="8"/><rect x="153" y="24" width="64" height="34" rx="8"/>
        <rect x="-127" y="94" width="64" height="34" rx="8"/><rect x="63" y="94" width="64" height="34" rx="8"/>
      </g>
      <!-- kernel -->
      <circle r="46" fill="url(#core)"/>
      <circle r="46" fill="none" stroke="#9fdfe2" stroke-width="1.5" stroke-opacity="0.6"/>
      <text x="0" y="6" font-size="15" font-weight="700" text-anchor="middle" fill="#08272a">kernel</text>
    </g>
    <text x="320" y="340" fill="#8fb6b8" font-size="13" letter-spacing="2" text-anchor="middle">LIGHTWEIGHT INTEGRATION MICRO-KERNEL</text>
  </g>
</svg>
