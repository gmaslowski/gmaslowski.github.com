<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="rpi-domoticz: Domoticz home automation containerized on a Raspberry Pi">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d0e"/>
      <stop offset="1" stop-color="#0c2a2d"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="40" y="56" fill="#eaf6f6" font-size="26" font-weight="700">rpi-domoticz</text>

    <!-- house / home automation hub -->
    <g transform="translate(230 110)">
      <path d="M90 0 L180 70 L160 70 L160 175 L20 175 L20 70 L0 70 Z" fill="#0b0d0e" stroke="#14b8c4" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- container badge = dockerized -->
      <rect x="58" y="92" width="64" height="58" rx="8" fill="none" stroke="#0e9aa7" stroke-width="2.5"/>
      <g fill="#14b8c4">
        <rect x="68" y="104" width="14" height="14" rx="2"/><rect x="88" y="104" width="14" height="14" rx="2"/>
        <rect x="78" y="124" width="14" height="14" rx="2"/>
      </g>
    </g>

    <!-- sensor nodes around the home -->
    <g>
      <g stroke="#14b8c4" stroke-opacity="0.45" stroke-width="1.5">
        <line x1="320" y1="200" x2="120" y2="150"/><line x1="320" y1="200" x2="120" y2="250"/>
        <line x1="320" y1="200" x2="520" y2="150"/><line x1="320" y1="200" x2="520" y2="250"/>
      </g>
      <g fill="#0b0d0e" stroke="#0e9aa7" stroke-width="2.5">
        <circle cx="120" cy="150" r="18"/><circle cx="120" cy="250" r="18"/>
        <circle cx="520" cy="150" r="18"/><circle cx="520" cy="250" r="18"/>
      </g>
      <g fill="#14b8c4"><circle cx="120" cy="150" r="5"/><circle cx="120" cy="250" r="5"/><circle cx="520" cy="150" r="5"/><circle cx="520" cy="250" r="5"/></g>
    </g>
    <text x="320" y="332" fill="#8fb6b8" font-size="13" letter-spacing="2" text-anchor="middle">DOMOTICZ HOME AUTOMATION · DOCKERIZED FOR RASPBERRY PI</text>
  </g>
</svg>
