<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Distractor: reactors distributed across JVM nodes over the network with Akka">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d0e"/>
      <stop offset="1" stop-color="#0c2a2d"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="40" y="56" fill="#eaf6f6" font-size="26" font-weight="700">distractor</text>

    <!-- three JVM nodes connected over network -->
    <g stroke="#14b8c4" stroke-width="2" stroke-dasharray="2 7" stroke-linecap="round" fill="none" stroke-opacity="0.75">
      <path d="M168 150 C 260 110, 380 110, 472 150"/>
      <path d="M168 210 C 260 260, 380 260, 472 210"/>
    </g>
    <g>
      <g fill="#0b0d0e" stroke="#0e9aa7" stroke-width="2.5">
        <rect x="78"  y="128" width="120" height="104" rx="12"/>
        <rect x="260" y="100" width="120" height="104" rx="12"/>
        <rect x="442" y="128" width="120" height="104" rx="12"/>
      </g>
      <!-- reactor dots inside each node -->
      <g fill="#14b8c4">
        <circle cx="118" cy="168" r="6"/><circle cx="158" cy="168" r="6"/><circle cx="138" cy="200" r="6"/>
        <circle cx="300" cy="140" r="6"/><circle cx="340" cy="140" r="6"/><circle cx="320" cy="172" r="6"/>
        <circle cx="482" cy="168" r="6"/><circle cx="522" cy="168" r="6"/><circle cx="502" cy="200" r="6"/>
      </g>
      <g fill="#9fdfe2" font-size="12" text-anchor="middle" letter-spacing="1">
        <text x="138" y="222">JVM</text><text x="320" y="194">JVM</text><text x="502" y="222">JVM</text>
      </g>
    </g>
    <text x="320" y="296" fill="#8fb6b8" font-size="13" letter-spacing="2" text-anchor="middle">SCALA · AKKA · NETWORK-DISTRIBUTED REACTORS</text>
  </g>
</svg>
