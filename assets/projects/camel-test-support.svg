<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Apache Camel route under test: from, process, to, with assertions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d0e"/>
      <stop offset="1" stop-color="#0c2a2d"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="40" y="56" fill="#eaf6f6" font-size="26" font-weight="700">camel-test-support</text>

    <!-- route pipeline -->
    <g>
      <line x1="120" y1="190" x2="520" y2="190" stroke="#14b8c4" stroke-opacity="0.4" stroke-width="2"/>
      <!-- nodes -->
      <g fill="#0b0d0e" stroke="#14b8c4" stroke-width="2.5">
        <rect x="78"  y="160" width="92" height="60" rx="10"/>
        <rect x="274" y="160" width="92" height="60" rx="10"/>
        <rect x="470" y="160" width="92" height="60" rx="10"/>
      </g>
      <g fill="#9fdfe2" font-size="15" text-anchor="middle">
        <text x="124" y="195">from()</text>
        <text x="320" y="195">process()</text>
        <text x="516" y="195">to()</text>
      </g>
      <!-- exchange arrows -->
      <g fill="#14b8c4">
        <path d="M205 184 l18 6 -18 6 z"/>
        <path d="M401 184 l18 6 -18 6 z"/>
      </g>
    </g>

    <!-- assertion / green check -->
    <circle cx="320" cy="285" r="24" fill="none" stroke="#14b8c4" stroke-width="2.5"/>
    <path d="M309 285 l7 8 14 -17" fill="none" stroke="#14b8c4" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="320" y="338" fill="#8fb6b8" font-size="13" letter-spacing="2" text-anchor="middle">ASSERT MOCK ENDPOINTS · JUnit API</text>
  </g>
</svg>
