<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Akka cluster: gossip-connected nodes in a ring">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d0e"/>
      <stop offset="1" stop-color="#0c2a2d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#14b8c4" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0e9aa7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
    <!-- gossip links: hexagon ring + cross mesh -->
    <g stroke="#14b8c4" fill="none">
      <path d="M320 90 L420 147 L420 261 L320 318 L220 261 L220 147 Z" stroke-opacity="0.45" stroke-width="1.5"/>
      <path d="M320 90 L420 261 M320 90 L220 261 M420 147 L220 261 M420 147 L320 318 M220 147 L420 261 M220 147 L320 318" stroke-opacity="0.16" stroke-width="1.5"/>
    </g>
    <!-- center coordinator glow -->
    <circle cx="320" cy="204" r="64" fill="url(#glow)"/>
    <!-- nodes -->
    <g fill="#0b0d0e" stroke-width="2.5">
      <circle cx="320" cy="90"  r="21" stroke="#14b8c4"/>
      <circle cx="420" cy="147" r="21" stroke="#0e9aa7"/>
      <circle cx="420" cy="261" r="21" stroke="#0e9aa7"/>
      <circle cx="320" cy="318" r="21" stroke="#0e9aa7"/>
      <circle cx="220" cy="261" r="21" stroke="#0e9aa7"/>
      <circle cx="220" cy="147" r="21" stroke="#14b8c4"/>
    </g>
    <g fill="#14b8c4">
      <circle cx="320" cy="90"  r="5"/><circle cx="420" cy="147" r="5"/><circle cx="420" cy="261" r="5"/>
      <circle cx="320" cy="318" r="5"/><circle cx="220" cy="261" r="5"/><circle cx="220" cy="147" r="5"/>
    </g>
    <text x="40" y="56" fill="#eaf6f6" font-size="26" font-weight="700">akka-cluster<tspan fill="#14b8c4">.g8</tspan></text>
    <text x="320" y="350" fill="#8fb6b8" font-size="13" letter-spacing="2" text-anchor="middle">GOSSIP · SHARDING · GITER8 TEMPLATE</text>
  </g>
</svg>
