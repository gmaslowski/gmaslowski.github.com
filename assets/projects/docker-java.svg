<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="docker-java: stacked container image layers shipping a JDK and JRE">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d0e"/>
      <stop offset="1" stop-color="#0c2a2d"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="40" y="56" fill="#eaf6f6" font-size="26" font-weight="700">docker<tspan fill="#14b8c4">-java</tspan></text>

    <!-- stacked image layers -->
    <g transform="translate(150 110)">
      <g stroke="#0e9aa7" stroke-width="2.5" fill="#0b0d0e">
        <rect x="0" y="120" width="240" height="44" rx="8"/>
        <rect x="0" y="68"  width="240" height="44" rx="8"/>
        <rect x="0" y="16"  width="240" height="44" rx="8" stroke="#14b8c4"/>
      </g>
      <g fill="#9fdfe2" font-size="14" letter-spacing="1">
        <text x="18" y="44">FROM scratch / alpine</text>
        <text x="18" y="96">JRE  ·  8u172 → 9</text>
        <text x="18" y="148" fill="#eaf6f6">JDK  ·  8u172 → 9</text>
      </g>
      <!-- container blocks at side -->
      <g fill="#14b8c4" transform="translate(266 16)">
        <rect x="0" y="0" width="20" height="20" rx="3"/><rect x="26" y="0" width="20" height="20" rx="3"/>
        <rect x="0" y="124" width="20" height="20" rx="3" fill-opacity="0.6"/><rect x="26" y="124" width="20" height="20" rx="3" fill-opacity="0.6"/>
      </g>
    </g>
    <text x="320" y="330" fill="#8fb6b8" font-size="13" letter-spacing="2" text-anchor="middle">SMALL JDK / JRE BASE IMAGES · DOCKER HUB</text>
  </g>
</svg>
